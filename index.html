<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tıklayınız</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: #111;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }
    .btn {
      font-size: 42px;
      font-weight: bold;
      color: #fff;
      background: #e00;
      border: none;
      border-radius: 16px;
      padding: 30px 70px;
      cursor: pointer;
      letter-spacing: 4px;
      transition: transform 0.1s;
      animation: pulse 1.5s infinite;
      user-select: none;
    }
    .btn:hover { transform: scale(1.07); }
    .btn:active { transform: scale(0.95); }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 30px #e00a; }
      50%       { box-shadow: 0 0 80px #e00; }
    }
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      align-items: center;
      justify-content: center;
      z-index: 999;
    }
    .overlay.active { display: flex; flex-direction: column; gap: 16px; }
    .overlay img {
      max-width: 90vw;
      max-height: 85vh;
      border-radius: 20px;
      animation: popIn 0.3s cubic-bezier(0.34,1.56,0.64,1);
    }
    @keyframes popIn {
      from { transform: scale(0.5) rotate(-5deg); opacity: 0; }
      to   { transform: scale(1) rotate(0deg);   opacity: 1; }
    }
    .close-hint {
      color: #ffffff88;
      font-size: 16px;
      letter-spacing: 1px;
    }
  </style>
</head>
